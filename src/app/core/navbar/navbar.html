<nav class="menu">

  <!-- LOGO -->

    <span>Agua de Vida</span>
  </div>

  <!-- LINKS -->
  <div class="links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">INICIO</a>
    <a routerLink="/predicas" routerLinkActive="active">PREDICAS</a>
    <a routerLink="/avisos" routerLinkActive="active">AVISOS</a>
    <a routerLink="/contacto" routerLinkActive="active">CONTACTO</a>
  </div>

  <!-- ICONOS -->
  <div class="icons">

    <!-- LUPA -->
    <button class="icon-btn" (click)="openSearch()" aria-label="Buscar">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>
    </button>

    <!-- GRID -->
    <button class="icon-btn" (click)="toggleSidebar()" aria-label="Menú">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
    </button>

  </div>

</nav>


<!-- BUSCADOR -->
<div class="search-overlay" *ngIf="showSearch">

  <div class="search-container">

    <div class="search-top">

      <div class="logo">
        <img src="logo.png" class="logo-img">
        <span>Agua de Vida</span>
      </div>

      <button class="close-btn" (click)="closeSearch()">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>

    </div>


    <div class="search-box">

      <input
        type="text"
        placeholder="Buscar..."
        [(ngModel)]="searchQuery"
        (keyup)="performSearch()"
        #searchInput
      />

      <svg viewBox="0 0 24 24" class="search-icon">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>

    </div>


    <!-- RESULTADOS -->

    <div class="search-results">

      <div *ngIf="results.length === 0 && searchQuery.length > 2">
        No se encontraron resultados
      </div>

      <div
        class="result"
        *ngFor="let r of results"
        (click)="goTo(r.route)"
      >
        {{r.title}}
      </div>

    </div>

  </div>

</div>

  </div>

<div class="sidebar-content">
