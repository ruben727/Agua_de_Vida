<nav class="menu">
  <div class="logo">
    <img src="logo.png" alt="Agua de Vida" class="logo-img" />
    <span>Agua de Vida</span>
  </div>

  <div class="links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">INICIO</a>
    <a routerLink="/cursos" routerLinkActive="active">CURSOS</a>
    <a routerLink="/contacto" routerLinkActive="active">CONTACTO</a>
    <a routerLink="/informacion" routerLinkActive="active">INFORMACIÓN</a>
  </div>

  <div class="icons">
    <button class="icon-btn" (click)="openSearch()" aria-label="Buscar">
      <!-- LUPA -->
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>
    </button>

    <button class="icon-btn" (click)="toggleSidebar()" aria-label="Menú">
      <!-- GRID -->
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
    </button>
  </div>
</nav>

<!-- SEARCH -->
<div class="search-overlay" *ngIf="showSearch">
  <div class="search-top">
    <div class="logo">
      <img src="logo.png" alt="Agua de Vida" class="logo-img" />
      <span>Agua de Vida</span>
    </div>

    <button class="close-btn" (click)="closeSearch()">
      <!-- X -->
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="search-box">
    <input
      type="text"
      placeholder="Escribe y presiona enter"
      [(ngModel)]="searchQuery"
      (keyup.enter)="performSearch()"
      #searchInput
    />

    <svg viewBox="0 0 24 24" class="search-icon">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
    </svg>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar-overlay" *ngIf="showSidebar" (click)="closeSidebar()"></div>

<div class="sidebar" [class.active]="showSidebar">
  <div class="sidebar-header">
    <div class="logo">
      <img src="logo.png" alt="Agua de Vida" class="logo-img" />
      <span>Agua de Vida</span>
    </div>

    <button class="close-btn" (click)="closeSidebar()">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="sidebar-content">
    <h3>Enlaces Externos</h3>

    <div class="external-links">
      <a href="https://facebook.com" target="_blank">
        <!-- FACEBOOK -->
        <svg viewBox="0 0 24 24">
          <path d="M17 2h-3a5 5 0 0 0-5 5v3H6v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
        <span>Facebook</span>
      </a>

      <a href="https://instagram.com" target="_blank">
        <!-- INSTAGRAM -->
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="18" cy="6" r="1"></circle>
        </svg>
        <span>Instagram</span>
      </a>

      <a href="https://youtube.com" target="_blank">
        <!-- YOUTUBE -->
        <svg viewBox="0 0 24 24">
          <polygon points="10,8 16,12 10,16"></polygon>
          <rect x="2" y="5" width="20" height="14" rx="4"></rect>
        </svg>
        <span>YouTube</span>
      </a>

      <a href="https://twitter.com" target="_blank">
        <!-- TWITTER -->
        <svg viewBox="0 0 24 24">
          <path d="M22 5c-.8.4-1.6.6-2.5.7a4.2 4.2 0 0 0 1.8-2.3c-.8.5-1.8.8-2.7 1A4.1 4.1 0 0 0 12 8.3c0 .3 0 .6.1.9A11.7 11.7 0 0 1 3 4.8a4.1 4.1 0 0 0 1.3 5.5c-.7 0-1.3-.2-1.9-.5v.1A4.1 4.1 0 0 0 5.9 14c-.4.1-.8.2-1.2.2-.3 0-.6 0-.8-.1a4.1 4.1 0 0 0 3.8 2.8A8.3 8.3 0 0 1 2 19.5 11.7 11.7 0 0 0 8.3 21c7.5 0 11.6-6.2 11.6-11.6v-.5c.8-.6 1.5-1.3 2.1-2z"/>
        </svg>
        <span>Twitter</span>
      </a>
    </div>

    <div class="contact-info">
      <h3>Contacto</h3>

      <p>
        <svg viewBox="0 0 24 24">
          <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.4 2L8.1 9.9a16 16 0 0 0 6 6l1.6-1.3a2 2 0 0 1 2-.4c.8.3 1.7.6 2.6.7A2 2 0 0 1 22 16.9z"/>
        </svg>
        +52 123 456 7890
      </p>

      <p>
        <svg viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"></rect>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        info@aguadevida.com
      </p>
    </div>
  </div>
</div>
